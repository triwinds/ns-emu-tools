name: Manual build

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ${{ matrix.os }}
    env:
      RUSTC_WRAPPER: sccache
      SCCACHE_GHA_ENABLED: 'true'
    strategy:
      fail-fast: false
      matrix:
        os: ['windows-latest']

    steps:
    - uses: actions/checkout@v5
    - uses: actions/setup-node@v5
      with:
        node-version: 22
    - uses: oven-sh/setup-bun@v2
    - uses: dtolnay/rust-toolchain@stable
    - uses: mozilla-actions/sccache-action@v0.0.9
      env:
        FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: 'true'
    - uses: Swatinem/rust-cache@v2
      with:
        shared-key: rust-${{ matrix.os }}
        workspaces: |
          src-tauri -> target
        cache-workspace-crates: true
    - uses: actions/cache@v5
      with:
        path: |
          ~/.bun/install/cache
          frontend/node_modules
        key: bun-${{ matrix.os }}-${{ hashFiles('frontend/bun.lock') }}
        restore-keys: |
          bun-${{ matrix.os }}-
    - name: Install frontend dependencies
      working-directory: frontend
      run: bun install
    - name: Build frontend
      working-directory: frontend
      run: bun run build
    - name: Build Rust executable
      run: cargo build --manifest-path src-tauri/Cargo.toml --release --locked --bin NsEmuTools
    - name: Show Rust cache stats
      if: always()
      run: sccache --show-stats
    - uses: actions/upload-artifact@v6
      with:
        path: src-tauri/target/release/NsEmuTools.exe
        name: NsEmuTools-windows-exe
        if-no-files-found: error
