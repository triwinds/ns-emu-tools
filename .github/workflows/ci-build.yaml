name: CI build

on:
  workflow_dispatch:
  push:
    branches:
      - main
    tags:
      - '*'

permissions:
  contents: write

jobs:
  build-windows:
    runs-on: windows-latest
    env:
      RUSTC_WRAPPER: sccache
      SCCACHE_GHA_ENABLED: 'true'
    steps:
    - uses: actions/checkout@v5
    - uses: actions/setup-node@v5
      with:
        node-version: 22
    - uses: oven-sh/setup-bun@v2
    - uses: dtolnay/rust-toolchain@stable
    - uses: mozilla-actions/sccache-action@v0.0.9
      env:
        FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: 'true'
    - uses: Swatinem/rust-cache@v2
      with:
        shared-key: rust-${{ runner.os }}-${{ runner.arch }}
        workspaces: |
          src-tauri -> target
        cache-workspace-crates: true
        cache-all-crates: true
    - uses: actions/cache@v5
      with:
        path: |
          ~/.bun/install/cache
          frontend/node_modules
        key: bun-${{ runner.os }}-${{ runner.arch }}-${{ hashFiles('frontend/bun.lock') }}
        restore-keys: |
          bun-${{ runner.os }}-${{ runner.arch }}-
    - name: Install frontend dependencies
      working-directory: frontend
      run: bun install --frozen-lockfile
    - name: Build frontend
      working-directory: frontend
      run: bun run build
    - name: Build Rust executable
      run: cargo build --manifest-path src-tauri/Cargo.toml --release --locked --bin NsEmuTools
    - name: Show Rust cache stats
      if: always()
      run: sccache --show-stats
    - uses: actions/upload-artifact@v6
      with:
        path: src-tauri/target/release/NsEmuTools.exe
        name: NsEmuTools-windows-exe
        if-no-files-found: error

  build-macos-app:
    runs-on: macos-latest
    env:
      RUSTC_WRAPPER: sccache
      SCCACHE_GHA_ENABLED: 'true'
    steps:
    - uses: actions/checkout@v5
    - uses: actions/setup-node@v5
      with:
        node-version: 22
    - uses: oven-sh/setup-bun@v2
    - uses: dtolnay/rust-toolchain@stable
    - uses: mozilla-actions/sccache-action@v0.0.9
      env:
        FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: 'true'
    - uses: Swatinem/rust-cache@v2
      with:
        shared-key: rust-${{ runner.os }}-${{ runner.arch }}
        workspaces: |
          src-tauri -> target
        cache-workspace-crates: true
        cache-all-crates: true
    - uses: actions/cache@v5
      with:
        path: |
          ~/.bun/install/cache
          frontend/node_modules
        key: bun-${{ runner.os }}-${{ runner.arch }}-${{ hashFiles('frontend/bun.lock') }}
        restore-keys: |
          bun-${{ runner.os }}-${{ runner.arch }}-
    - name: Install frontend dependencies
      working-directory: frontend
      run: bun install --frozen-lockfile
    - name: Install Tauri CLI
      shell: bash
      run: |
        if ! cargo tauri --version >/dev/null 2>&1; then
          cargo install tauri-cli --locked --version '^2'
        fi
    - name: Build macOS app bundle
      working-directory: src-tauri
      run: cargo tauri build --bundles app
    - name: Archive macOS app bundle
      shell: bash
      run: |
        APP_PATH="src-tauri/target/release/bundle/macos/NS Emu Tools.app"
        ZIP_PATH="src-tauri/target/release/bundle/macos/NS-Emu-Tools-macos-app.zip"

        test -d "$APP_PATH"
        /usr/bin/ditto -c -k --sequesterRsrc --keepParent "$APP_PATH" "$ZIP_PATH"
    - name: Show Rust cache stats
      if: always()
      run: sccache --show-stats
    - uses: actions/upload-artifact@v6
      with:
        path: src-tauri/target/release/bundle/macos/NS-Emu-Tools-macos-app.zip
        name: NsEmuTools-macos-app
        if-no-files-found: error

  release:
    if: startsWith(github.ref, 'refs/tags/')
    needs:
      - build-windows
      - build-macos-app
    runs-on: ubuntu-latest
    steps:
    - uses: actions/download-artifact@v7
      with:
        path: dist
    - name: Release
      uses: softprops/action-gh-release@v2.2.2
      with:
        draft: true
        files: |
          dist/NsEmuTools-windows-exe/NsEmuTools.exe
          dist/NsEmuTools-macos-app/NS-Emu-Tools-macos-app.zip
