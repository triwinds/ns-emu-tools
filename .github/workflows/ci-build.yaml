name: CI build

on:
  workflow_dispatch:
  push:
    branches:
      - main
    tags:
      - '*'

permissions:
  contents: write

jobs:
  build-windows:
    runs-on: windows-latest
    env:
      RUSTC_WRAPPER: sccache
      SCCACHE_GHA_ENABLED: 'true'
    steps:
    - uses: actions/checkout@v5
    - uses: actions/setup-node@v6
      with:
        node-version: 22
    - uses: oven-sh/setup-bun@v2
    - uses: dtolnay/rust-toolchain@stable
    - uses: mozilla-actions/sccache-action@v0.0.9
      env:
        FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: 'true'
    - uses: Swatinem/rust-cache@v2
      with:
        shared-key: rust-${{ runner.os }}-${{ runner.arch }}
        workspaces: |
          src-tauri -> target
        cache-workspace-crates: true
        cache-all-crates: true
    - uses: actions/cache@v5
      with:
        path: |
          ~/.bun/install/cache
          frontend/node_modules
        key: bun-${{ runner.os }}-${{ runner.arch }}-${{ hashFiles('frontend/bun.lock') }}
        restore-keys: |
          bun-${{ runner.os }}-${{ runner.arch }}-
    - name: Install frontend dependencies
      working-directory: frontend
      run: bun install --frozen-lockfile
    - name: Build frontend
      working-directory: frontend
      run: bun run build
    - name: Build Rust executable
      run: cargo build --manifest-path src-tauri/Cargo.toml --release --locked --bin NsEmuTools
    - name: Package Windows portable zip
      shell: pwsh
      run: |
        $exePath = "src-tauri/target/release/NsEmuTools.exe"
        if (-not (Test-Path $exePath)) { throw "NsEmuTools.exe not found" }
        Compress-Archive -Path $exePath -DestinationPath "src-tauri/target/release/NsEmuTools-windows-portable.zip"
    - name: Show Rust cache stats
      if: always()
      run: sccache --show-stats
    - uses: actions/upload-artifact@v6
      with:
        path: src-tauri/target/release/NsEmuTools.exe
        name: NsEmuTools-windows-exe
        if-no-files-found: error
    - uses: actions/upload-artifact@v6
      with:
        path: src-tauri/target/release/NsEmuTools-windows-portable.zip
        name: NsEmuTools-windows-zip
        if-no-files-found: error

  build-macos-app:
    runs-on: macos-latest
    env:
      RUSTC_WRAPPER: sccache
      SCCACHE_GHA_ENABLED: 'true'
    steps:
    - uses: actions/checkout@v5
    - uses: actions/setup-node@v6
      with:
        node-version: 22
    - uses: oven-sh/setup-bun@v2
    - uses: dtolnay/rust-toolchain@stable
    - uses: mozilla-actions/sccache-action@v0.0.9
      env:
        FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: 'true'
    - uses: Swatinem/rust-cache@v2
      with:
        shared-key: rust-${{ runner.os }}-${{ runner.arch }}
        workspaces: |
          src-tauri -> target
        cache-workspace-crates: true
        cache-all-crates: true
    - uses: actions/cache@v5
      with:
        path: |
          ~/.bun/install/cache
          frontend/node_modules
        key: bun-${{ runner.os }}-${{ runner.arch }}-${{ hashFiles('frontend/bun.lock') }}
        restore-keys: |
          bun-${{ runner.os }}-${{ runner.arch }}-
    - name: Install frontend dependencies
      working-directory: frontend
      run: bun install --frozen-lockfile
    - name: Install Tauri CLI
      shell: bash
      run: |
        if ! cargo tauri --version >/dev/null 2>&1; then
          cargo install tauri-cli --locked --version '^2'
        fi
    - name: Build macOS app bundle
      working-directory: src-tauri
      run: cargo tauri build --bundles app
    - name: Archive macOS app bundle (zip)
      shell: bash
      run: |
        APP_PATH="src-tauri/target/release/bundle/macos/NS Emu Tools.app"
        ZIP_PATH="src-tauri/target/release/bundle/macos/NS-Emu-Tools-macos-app.zip"

        test -d "$APP_PATH"
        /usr/bin/ditto -c -k --sequesterRsrc --keepParent "$APP_PATH" "$ZIP_PATH"
    - name: Archive macOS app bundle (tar.gz fallback)
      shell: bash
      run: |
        APP_PATH="src-tauri/target/release/bundle/macos/NS Emu Tools.app"
        TAR_PATH="src-tauri/target/release/bundle/macos/NS-Emu-Tools-macos-app.tar.gz"

        test -d "$APP_PATH"
        tar -czf "$TAR_PATH" -C "src-tauri/target/release/bundle/macos" "NS Emu Tools.app"
    - name: Show Rust cache stats
      if: always()
      run: sccache --show-stats
    - uses: actions/upload-artifact@v6
      with:
        path: src-tauri/target/release/bundle/macos/NS-Emu-Tools-macos-app.zip
        name: NsEmuTools-macos-zip
        if-no-files-found: error
    - uses: actions/upload-artifact@v6
      with:
        path: src-tauri/target/release/bundle/macos/NS-Emu-Tools-macos-app.tar.gz
        name: NsEmuTools-macos-app-archive
        if-no-files-found: error

  release:
    if: startsWith(github.ref, 'refs/tags/')
    needs:
      - build-windows
      - build-macos-app
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v5
    - uses: actions/download-artifact@v7
      with:
        path: dist
    - name: Generate release notes
      uses: actions/github-script@v7
      with:
        script: |
          const fs = require('node:fs');

          const tagName = context.ref.replace('refs/tags/', '');
          const versionCandidates = [...new Set([
            tagName,
            tagName.replace(/^v/i, ''),
          ].filter(Boolean))];

          function extractChangelogEntry(filePath, versions) {
            if (!fs.existsSync(filePath)) {
              return '';
            }

            const lines = fs.readFileSync(filePath, 'utf8').split(/\r?\n/);

            for (const version of versions) {
              const heading = `## ${version}`;
              const startIndex = lines.findIndex((line) => line.trim() === heading);
              if (startIndex === -1) {
                continue;
              }

              let endIndex = startIndex + 1;
              while (endIndex < lines.length && !lines[endIndex].trim().startsWith('## ')) {
                endIndex += 1;
              }

              return lines.slice(startIndex, endIndex).join('\n').trim();
            }

            return '';
          }

          const changelogEntry = extractChangelogEntry('changelog.md', versionCandidates);

          const { data } = await github.rest.repos.generateReleaseNotes({
            owner: context.repo.owner,
            repo: context.repo.repo,
            tag_name: tagName,
          });

          const appendix = [
            'macOS 下如果提示程序损坏, 可以执行一下下面的命令:',
            '',
            '```bash',
            'xattr -d com.apple.quarantine /path/to/NS\\ Emu\\ Tools.app',
            '```',
          ].join('\n');

          const sections = [
            changelogEntry,
            data.body.trim(),
            appendix,
          ].filter(Boolean);

          const releaseNotes = `${sections.join('\n\n')}\n`;
          fs.writeFileSync('dist/release-notes.md', releaseNotes);
    - name: Release
      uses: softprops/action-gh-release@v2.2.2
      with:
        draft: true
        body_path: dist/release-notes.md
        files: |
          dist/NsEmuTools-windows-zip/NsEmuTools-windows-portable.zip
          dist/NsEmuTools-windows-exe/NsEmuTools.exe
          dist/NsEmuTools-macos-zip/NS-Emu-Tools-macos-app.zip
          dist/NsEmuTools-macos-app-archive/NS-Emu-Tools-macos-app.tar.gz
